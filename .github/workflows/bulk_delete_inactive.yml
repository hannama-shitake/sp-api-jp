name: Bulk Delete Inactive Listings

on:
  workflow_dispatch:
    inputs:
      action:
        description: '実行アクション'
        required: true
        default: 'dry_run'
        type: choice
        options:
          - dry_run          # 件数確認のみ
          - delete_all       # inactive全件削除
          - retry_failed     # 前回失敗分のみ再試行

jobs:
  bulk-delete-inactive:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bulk delete inactive
        env:
          AMAZON_AU_REFRESH_TOKEN: ${{ secrets.AMAZON_AU_REFRESH_TOKEN }}
          AMAZON_AU_LWA_CLIENT_ID: ${{ secrets.AMAZON_AU_LWA_CLIENT_ID }}
          AMAZON_AU_LWA_CLIENT_SECRET: ${{ secrets.AMAZON_AU_LWA_CLIENT_SECRET }}
          AMAZON_AU_SELLER_ID: ${{ secrets.AMAZON_AU_SELLER_ID }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        run: |
          case "${{ github.event.inputs.action }}" in
            dry_run)
              python bulk_delete_inactive.py --dry-run
              ;;
            delete_all)
              python bulk_delete_inactive.py --yes
              ;;
            retry_failed)
              python bulk_delete_inactive.py --yes --retry-failed
              ;;
          esac

      - name: Upload failure CSV (if any)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bulk_delete_failed
          path: bulk_delete_failed.csv
          if-no-files-found: ignore
          retention-days: 7
