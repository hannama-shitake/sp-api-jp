name: Bulk Reactivate

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'DRY RUN（確認のみ、実際には再出品しない）'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
  schedule:
    - cron: '0 18 * * 0'  # 毎週日曜 03:00 JST（inactive一括回復）

jobs:
  bulk-reactivate:
    runs-on: ubuntu-latest
    timeout-minutes: 150

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Bulk reactivate inactive listings
        env:
          AMAZON_JP_REFRESH_TOKEN: ${{ secrets.AMAZON_JP_REFRESH_TOKEN }}
          AMAZON_JP_LWA_CLIENT_ID: ${{ secrets.AMAZON_JP_LWA_CLIENT_ID }}
          AMAZON_JP_LWA_CLIENT_SECRET: ${{ secrets.AMAZON_JP_LWA_CLIENT_SECRET }}
          AMAZON_AU_REFRESH_TOKEN: ${{ secrets.AMAZON_AU_REFRESH_TOKEN }}
          AMAZON_AU_LWA_CLIENT_ID: ${{ secrets.AMAZON_AU_LWA_CLIENT_ID }}
          AMAZON_AU_LWA_CLIENT_SECRET: ${{ secrets.AMAZON_AU_LWA_CLIENT_SECRET }}
          AMAZON_AU_SELLER_ID: ${{ secrets.AMAZON_AU_SELLER_ID }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          MIN_PROFIT_RATE: ${{ secrets.MIN_PROFIT_RATE }}
          DHL_SHIPPING_JPY: "3800"
          AU_FEE_RATE: "0.15"
          MAX_FAIR_PRICE_RATIO: "3.0"
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python bulk_reactivate.py --dry-run
          else
            python bulk_reactivate.py
          fi
