name: Recheck Candidates

on:
  schedule:
    - cron: '0 17 * * *'  # 毎日 02:00 JST（catalog_discover の 1時間後）
  workflow_dispatch:
    inputs:
      max_asins:
        description: '再チェック上限件数'
        required: false
        default: '500'
      dry_run:
        description: 'DRY-RUN（出品しない）'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  recheck:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download candidates DB (artifact)
        uses: dawidd6/action-download-artifact@v6
        with:
          name: arbitrage-db
          path: .
          if_no_artifact_found: ignore
          workflow_conclusion: success

      - name: Recheck candidates & auto-list
        env:
          AMAZON_JP_REFRESH_TOKEN: ${{ secrets.AMAZON_JP_REFRESH_TOKEN }}
          AMAZON_JP_LWA_CLIENT_ID: ${{ secrets.AMAZON_JP_LWA_CLIENT_ID }}
          AMAZON_JP_LWA_CLIENT_SECRET: ${{ secrets.AMAZON_JP_LWA_CLIENT_SECRET }}
          AMAZON_AU_REFRESH_TOKEN: ${{ secrets.AMAZON_AU_REFRESH_TOKEN }}
          AMAZON_AU_LWA_CLIENT_ID: ${{ secrets.AMAZON_AU_LWA_CLIENT_ID }}
          AMAZON_AU_LWA_CLIENT_SECRET: ${{ secrets.AMAZON_AU_LWA_CLIENT_SECRET }}
          AMAZON_AU_SELLER_ID: ${{ secrets.AMAZON_AU_SELLER_ID }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          MIN_PROFIT_RATE: ${{ secrets.MIN_PROFIT_RATE }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="--dry-run"
          fi
          MAX="${{ github.event.inputs.max_asins }}"
          python recheck_candidates.py $ARGS --max "${MAX:-500}"

      - name: Upload candidates DB (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: arbitrage-db
          path: arbitrage.db
          retention-days: 30
          overwrite: true
