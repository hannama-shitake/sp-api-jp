name: Arbitrage Monitor

on:
  schedule:
    - cron: '0 * * * *'  # 1時間ごと
  workflow_dispatch:      # 手動実行も可能

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run arbitrage monitor
        env:
          AMAZON_JP_REFRESH_TOKEN: ${{ secrets.AMAZON_JP_REFRESH_TOKEN }}
          AMAZON_JP_LWA_CLIENT_ID: ${{ secrets.AMAZON_JP_LWA_CLIENT_ID }}
          AMAZON_JP_LWA_CLIENT_SECRET: ${{ secrets.AMAZON_JP_LWA_CLIENT_SECRET }}
          AMAZON_AU_REFRESH_TOKEN: ${{ secrets.AMAZON_AU_REFRESH_TOKEN }}
          AMAZON_AU_LWA_CLIENT_ID: ${{ secrets.AMAZON_AU_LWA_CLIENT_ID }}
          AMAZON_AU_LWA_CLIENT_SECRET: ${{ secrets.AMAZON_AU_LWA_CLIENT_SECRET }}
          AMAZON_AU_SELLER_ID: ${{ secrets.AMAZON_AU_SELLER_ID }}
          SELLER_URLS: ${{ secrets.SELLER_URLS }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          MIN_PROFIT_RATE: ${{ secrets.MIN_PROFIT_RATE }}
          PROXY_USER: ${{ secrets.PROXY_USER }}
          PROXY_PASS: ${{ secrets.PROXY_PASS }}
        run: |
          # SELLER_URLS はカンマ区切りで複数URL対応
          # 例: "https://www.amazon.com.au/s?me=AAA...,https://www.amazon.com.au/s?me=BBB..."
          IFS=',' read -ra URLS <<< "$SELLER_URLS"
          for url in "${URLS[@]}"; do
            url=$(echo "$url" | xargs)  # 前後の空白を除去
            echo "===== セラー監視: $url ====="
            python main.py list --url "$url"
          done
